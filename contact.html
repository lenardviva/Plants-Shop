<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PlantShop - Contact</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script>
function sendMessage() {
  alert("Message / Inquiry successfully sent! 🌼");
}
</script>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="index.html">PlantShop 🌿</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link text-white" href="index.html">Shop</a>
      <a class="nav-link text-white" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-center">Contact Us 🌼</h2>

  <form class="mt-4" onsubmit="sendMessage(); return false;">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea class="form-control" required></textarea>
    </div>

    <button class="btn btn-success" type="submit">Send Message</button>
  </form>
</div>

</body>
</html>
