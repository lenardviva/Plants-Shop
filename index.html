<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plant Shop - Shop</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="index.html">PlantShop 🌿</a>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-center">Our Plants 🌱</h2>

  <div class="row mt-4">

    <div class="col-md-4">
      <div class="card">
        <img src="snake-plant.jpg.webp" class="card-img-top">
        <div class="card-body text-center">
          <h5>Snake Plant</h5>
          <p>₱250</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="succelent.jpg class="card-img-top">
        <div class="card-body text-center">
          <h5>Succulent</h5>
          <p>₱150</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="flower plant.jpeg" class="card-img-top">
        <div class="card-body text-center">
          <h5>Flower Plant</h5>
          <p>₱300</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>

<div class="container mt-5">
  <h2 class="text-center">Contact Us 🌼</h2>

  <form class="mt-4">
    <div class="mb-3">
      <label>Name</label>
      <input type="text" class="form-control">
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control">
    </div>

    <div class="mb-3">
      <label>Message</label>
      <textarea class="form-control"></textarea>
    </div>

    <button class="btn btn-success">Send Message</button>
  </form>
</div>

</body>
</html>
